<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen: Temas Selectos de Física</title>
				<style>
					/* Variables de color estilo gamificación, orientadas a abstracción matemática */
					:root {
									--primary-bg: #f4f6f9;
									--header-bg: #4a148c; /* Púrpura profundo: análisis lógico y concentración */
									--text-main: #333333;
									--text-light: #ffffff;
									--q-bg: #ffffff;
									--opt-a: #e21b3c; /* Rojo */
									--opt-b: #1368ce; /* Azul */
									--opt-c: #d89e00; /* Amarillo */
									--opt-d: #26890c; /* Verde */
					}

					* {
									box-sizing: border-box;
									margin: 0;
									padding: 0;
									font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
					}

					body {
									background-color: var(--primary-bg);
									color: var(--text-main);
									line-height: 1.6;
					}

					.container {
									max-width: 900px;
									margin: 0 auto;
									padding: 20px;
					}

					header {
									background-color: var(--header-bg);
									color: var(--text-light);
									padding: 30px 20px;
									border-radius: 12px;
									margin-bottom: 30px;
									text-align: center;
									box-shadow: 0 4px 6px rgba(0,0,0,0.1);
					}

					h1 {
									font-size: 2.2rem;
									margin-bottom: 20px;
					}

					/* Campos de identificación interactivos web */
					.student-info {
									display: flex;
									flex-wrap: wrap;
									gap: 20px;
									justify-content: space-between;
									background: rgba(255, 255, 255, 0.1);
									padding: 15px;
									border-radius: 8px;
					}

					.info-group {
									flex: 1;
									min-width: 200px;
									display: flex;
									align-items: center;
									gap: 10px;
					}

					.info-group label {
									font-weight: bold;
									font-size: 1.1rem;
									white-space: nowrap;
					}

					.info-group input {
									flex: 1;
									background: transparent;
									border: none;
									border-bottom: 2px solid var(--text-light);
									color: var(--text-light);
									font-size: 1.1rem;
									padding: 5px;
									outline: none;
					}

					.question-card {
									background-color: var(--q-bg);
									padding: 25px;
									border-radius: 12px;
									margin-bottom: 25px;
									box-shadow: 0 2px 5px rgba(0,0,0,0.05);
									border-left: 6px solid var(--header-bg);
					}

					.question-text {
									font-size: 1.25rem;
									font-weight: 600;
									margin-bottom: 15px;
					}

					.options-grid {
									display: grid;
									grid-template-columns: 1fr 1fr;
									gap: 15px;
					}

					.option-label {
									display: flex;
									align-items: center;
									padding: 15px;
									border-radius: 8px;
									color: white;
									font-weight: bold;
									font-size: 1.1rem;
									cursor: pointer;
									transition: transform 0.2s, filter 0.2s;
					}

					.option-label:hover {
									filter: brightness(1.1);
									transform: translateY(-2px);
					}

					.option-label input[type="radio"] {
									margin-right: 15px;
									transform: scale(1.5);
									cursor: pointer;
					}

					.opt-0 { background-color: var(--opt-a); }
					.opt-1 { background-color: var(--opt-b); }
					.opt-2 { background-color: var(--opt-c); }
					.opt-3 { background-color: var(--opt-d); }

					.submit-btn {
									display: block;
									width: 100%;
									padding: 15px;
									font-size: 1.3rem;
									font-weight: bold;
									background-color: var(--header-bg);
									color: white;
									border: none;
									border-radius: 8px;
									cursor: pointer;
									margin-top: 30px;
									transition: background 0.3s;
					}

					.submit-btn:hover { background-color: #310c5e; }

					#result-container {
									margin-top: 20px;
									padding: 20px;
									background-color: #d4edda;
									color: #155724;
									border-radius: 8px;
									font-size: 1.5rem;
									text-align: center;
									font-weight: bold;
									display: none;
					}

					.footer-text {
									text-align: center;
									margin-top: 40px;
									color: #666;
									font-size: 0.9rem;
									font-weight: bold;
					}

					/* =========================================================
								CONFIGURACIÓN ULTRA-COMPRIMIDA PARA IMPRESIÓN (MAX 2 HOJAS)
								========================================================= */
					@media print {
									@page { 
													size: letter; 
													margin: 1cm; /* Margen drásticamente reducido */
									}
									body { 
													background-color: white; 
													color: black; 
													font-size: 10pt; /* Tamaño óptimo para legibilidad y compresión */
													line-height: 1.1; 
									}
									.container { width: 100%; max-width: none; padding: 0; }
									
									/* Encabezado limpio y minimalista */
									header { 
													background-color: white !important; 
													color: black !important; 
													box-shadow: none; 
													border-bottom: none; 
													border-radius: 0; 
													padding: 0; 
													margin-bottom: 10px; 
													text-align: left;
									}
									h1 { font-size: 14pt; margin-bottom: 10px; border-bottom: 2px solid black; padding-bottom: 5px; }
									
									/* Campos de identificación sin bordes innecesarios */
									.student-info { background: none; padding: 0; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap;}
									.info-group label { color: black; font-size: 10pt; font-weight: normal;}
									.info-group input { border: none; border-bottom: 1px solid black; color: black; font-size: 10pt; padding: 0; }
									
									/* Eliminación de bordes y sombras en las preguntas */
									.question-card { 
													box-shadow: none; 
													border: none; /* Borde eliminado */
													border-bottom: 1px dashed #ccc; /* Solo un separador sutil */
													border-left: none; 
													padding: 5px 0; /* Padding vertical mínimo */
													margin-bottom: 5px; 
													page-break-inside: avoid; 
													break-inside: avoid; 
									}
									
									.question-text { font-size: 10pt; margin-bottom: 4px; font-weight: bold; }
									
									/* Opciones compactas sin colores de fondo */
									.options-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
									.option-label { 
													background-color: transparent !important; 
													color: black !important; 
													border: none; /* Borde eliminado */
													padding: 2px 0; 
													font-size: 10pt;
													font-weight: normal;
									}
									.option-label input[type="radio"] {
													transform: scale(0.9); /* Ligeramente más pequeño */
													margin-right: 5px;
									}

									/* Ocultar elementos web */
									.submit-btn, #result-container { display: none !important; }
									
									.footer-text { 
													position: fixed; 
													bottom: 0; 
													width: 100%; 
													border-top: 1px solid #ccc; 
													padding-top: 3px; 
													font-size: 8pt;
									}
					}

					@media (max-width: 600px) {
									.options-grid { grid-template-columns: 1fr; }
									.student-info { flex-direction: column; }
									.info-group { width: 100%; }
					}
	</style>
</head>
<body>

<div class="container">
    <header>
        <h1>Evaluación: Temas Selectos de Física</h1>
        <div class="student-info">
            <div class="info-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" autocomplete="off">
            </div>
            <div class="info-group">
                <label for="semestre">Semestre/Grupo:</label>
                <input type="text" id="semestre" name="semestre" autocomplete="off">
            </div>
            <div class="info-group">
                <label for="fecha">Fecha:</label>
                <input type="text" id="fecha" name="fecha" autocomplete="off">
            </div>
        </div>
    </header>

    <form id="quiz-form">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="calificarExamen()">Calificar Examen</button>
        <div id="result-container"></div>
    </form>
    
    <div class="footer-text">
        &copy; 2026 JMGV-PTEL Programa de TEMAS SELECTOS DE FISICA 2. Todos los derechos reservados.
    </div>
</div>

<script>
    const quizData = [
        { question: "1. De acuerdo con la Ley de Coulomb, si la distancia entre dos cargas puntuales eléctricas se reduce a la mitad, ¿qué ocurre con la magnitud de la fuerza de atracción o repulsión entre ellas?", options: ["Se cuadruplica", "Se reduce a la cuarta parte", "Se duplica", "Permanece igual"], correct: 0 },
        { question: "2. ¿Qué partícula subatómica es la principal responsable de que un material conductor adquiera una carga eléctrica neta negativa al ser frotado?", options: ["El electrón, porque se transfiere entre materiales", "El protón, porque viaja desde el núcleo", "El neutrón, porque adquiere polaridad", "El positrón, porque se aniquila con la materia"], correct: 0 },
        { question: "3. Por convención física, la dirección de las líneas de un Campo Eléctrico en un punto del espacio siempre se define como la dirección de la fuerza que experimentaría:", options: ["Una carga de prueba positiva", "Una carga de prueba negativa", "Un campo magnético perpendicular", "Un neutrón en reposo"], correct: 0 },
        { question: "4. ¿Qué magnitud física describe correctamente la Fuerza Electromotriz (FEM) proporcionada por una batería?", options: ["La energía suministrada por cada unidad de carga que la atraviesa", "La fuerza mecánica que empuja los cables del circuito", "La resistencia interna del propio generador", "La velocidad con la que fluyen los electrones en el circuito"], correct: 0 },
        { question: "5. Según la Ley de Ohm, si en un componente resistivo se duplica el voltaje aplicado manteniendo su resistencia constante, ¿qué sucederá con la corriente eléctrica?", options: ["Se duplica de manera directamente proporcional", "Se reduce a la mitad de forma inversamente proporcional", "Se cuadruplica debido al efecto Joule", "Permanece constante sin importar el voltaje"], correct: 0 },
        { question: "6. En un circuito donde tres focos (resistencias) están conectados estrictamente en SERIE, ¿qué parámetro eléctrico es idéntico para los tres?", options: ["La corriente eléctrica (Amperaje)", "La caída de voltaje (Voltaje)", "La potencia disipada (Vataje)", "La resistencia total (Ohmios)"], correct: 0 },
        { question: "7. Al conectar múltiples resistencias eléctricas en PARALELO, la resistencia equivalente total del circuito siempre será:", options: ["Menor que la resistencia individual más pequeña del circuito", "Mayor que la resistencia más grande del circuito", "Exactamente igual a la suma aritmética de todas las resistencias", "El promedio exacto de las resistencias conectadas"], correct: 0 },
        { question: "8. La Ley de Corrientes de Kirchhoff (LCK) establece que la suma de las corrientes que entran a un nodo es igual a la suma de las corrientes que salen. Esto es una consecuencia directa del principio de:", options: ["Conservación de la carga eléctrica", "Conservación de la energía mecánica", "Conservación de la masa inercial", "La Ley de Faraday"], correct: 0 },
        { question: "9. La Ley de Voltajes de Kirchhoff (LVK) indica que en cualquier lazo o malla cerrada, la suma algebraica de los voltajes es igual a cero. Este postulado se fundamenta en el principio de:", options: ["Conservación de la energía", "Conservación de la carga", "Atracción magnética", "Resistencia de materiales"], correct: 0 },
        { question: "10. Tienes tres cargas alineadas horizontalmente: q1 (Positiva) a la izquierda, q2 (Negativa) en el centro, y q3 (Positiva) a la derecha. ¿Qué tipo de fuerza electromagnética experimenta la carga central q2?", options: ["Atracción hacia ambas cargas laterales (q1 y q3)", "Repulsión hacia ambas cargas laterales (q1 y q3)", "Atracción hacia q1 pero repulsión hacia q3", "Ninguna, al estar en el centro las fuerzas siempre se anulan"], correct: 0 }
    ];

    quizData.forEach((q) => {
        let optionsWithIndex = q.options.map((opt, index) => {
            return { text: opt, isCorrect: (index === q.correct) };
        });

        for (let i = optionsWithIndex.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
        }

        q.options = optionsWithIndex.map(opt => opt.text);
        q.correct = optionsWithIndex.findIndex(opt => opt.isCorrect);
    });

    const container = document.getElementById('questions-container');

    quizData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        let optionsHTML = '';
        q.options.forEach((opt, i) => {
            optionsHTML += `
                <label class="option-label opt-${i}">
                    <input type="radio" name="q${index}" value="${i}">
                    <span>${opt}</span>
                </label>
            `;
        });

        card.innerHTML = `
            <div class="question-text">${q.question}</div>
            <div class="options-grid">
                ${optionsHTML}
            </div>
        `;
        container.appendChild(card);
    });

    function calificarExamen() {
        let score = 0;
        let allAnswered = true;

        quizData.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected) {
                if (parseInt(selected.value) === q.correct) {
                    score++;
                }
            } else {
                allAnswered = false;
            }
        });

        const resultDiv = document.getElementById('result-container');
        resultDiv.style.display = 'block';

        if (!allAnswered) {
            resultDiv.style.backgroundColor = '#fff3cd';
            resultDiv.style.color = '#856404';
            resultDiv.innerHTML = 'Por favor, asegúrate de responder las 10 preguntas para obtener un diagnóstico completo.';
            return;
        }

        const percentage = Math.round((score / quizData.length) * 100);
        resultDiv.style.backgroundColor = score >= 6 ? '#d4edda' : '#f8d7da';
        resultDiv.style.color = score >= 6 ? '#155724' : '#721c24';
        resultDiv.innerHTML = `Tu calificación es: ${score} de 10 (${percentage}%)`;
    }
</script>

</body>
</html>
